<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 120" width="560" height="120">
  <!--
    astra · agent glyph system
    one-stroke marks that identify each agent on the canvas
    rendered at a uniform 40×40 box, 1px stroke weight, monochrome white
    Each is drawn so it reads at 16×16 favicon size while also being
    beautiful at 200×200 hero size.
  -->

  <defs>
    <filter id="gl-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g stroke="rgba(255,255,255,0.88)" stroke-width="1.2" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#gl-glow)">

    <!-- EMAIL · envelope-slit: a horizontal line meeting a downward V -->
    <g transform="translate(20, 20)">
      <rect x="0" y="4" width="40" height="32" rx="1"/>
      <polyline points="0,8 20,22 40,8"/>
    </g>
    <text x="40" y="92" text-anchor="middle" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.35)" letter-spacing="0.08em">EMAIL</text>

    <!-- FINANCE · the ledger line: horizontal with a single vertical stroke -->
    <g transform="translate(100, 20)">
      <line x1="0" y1="20" x2="40" y2="20"/>
      <line x1="20" y1="4" x2="20" y2="36"/>
      <line x1="4" y1="32" x2="14" y2="32"/>
      <line x1="26" y1="32" x2="36" y2="32"/>
    </g>
    <text x="120" y="92" text-anchor="middle" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.35)" letter-spacing="0.08em">FINANCE</text>

    <!-- WHATSAPP · the speech curl: an inward spiral that starts as a tail -->
    <g transform="translate(180, 20)">
      <path d="M 4 36 L 4 16 A 12 12 0 0 1 16 4 L 28 4 A 12 12 0 0 1 40 16 L 40 28 A 12 12 0 0 1 28 40 L 12 40 Z"/>
      <circle cx="20" cy="22" r="1"/>
    </g>
    <text x="200" y="92" text-anchor="middle" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.35)" letter-spacing="0.08em">WHATSAPP</text>

    <!-- LINKEDIN · the column and anchor -->
    <g transform="translate(260, 20)">
      <line x1="10" y1="4" x2="10" y2="36"/>
      <circle cx="10" cy="10" r="2"/>
      <path d="M 20 18 L 20 36"/>
      <path d="M 20 26 A 8 8 0 0 1 36 26 L 36 36"/>
    </g>
    <text x="280" y="92" text-anchor="middle" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.35)" letter-spacing="0.08em">LINKEDIN</text>

    <!-- BOOKKEEPER · the T-account cross -->
    <g transform="translate(340, 20)">
      <line x1="0" y1="12" x2="40" y2="12"/>
      <line x1="20" y1="12" x2="20" y2="40"/>
      <line x1="4" y1="22" x2="16" y2="22"/>
      <line x1="24" y1="22" x2="36" y2="22"/>
      <line x1="4" y1="30" x2="16" y2="30"/>
      <line x1="24" y1="30" x2="36" y2="30"/>
    </g>
    <text x="360" y="92" text-anchor="middle" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.35)" letter-spacing="0.08em">BOOKKEEPER</text>

    <!-- APEX · a peak / chevron -->
    <g transform="translate(420, 20)">
      <path d="M 4 36 L 20 4 L 36 36"/>
      <circle cx="20" cy="14" r="1.5"/>
    </g>
    <text x="440" y="92" text-anchor="middle" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.35)" letter-spacing="0.08em">APEX</text>

    <!-- HELMTECH · the wheel / helm -->
    <g transform="translate(500, 20)">
      <circle cx="20" cy="20" r="14"/>
      <line x1="20" y1="2" x2="20" y2="38"/>
      <line x1="2" y1="20" x2="38" y2="20"/>
      <line x1="7.3" y1="7.3" x2="32.7" y2="32.7"/>
      <line x1="32.7" y1="7.3" x2="7.3" y2="32.7"/>
      <circle cx="20" cy="20" r="3"/>
    </g>
    <text x="520" y="92" text-anchor="middle" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.35)" letter-spacing="0.08em">HELMTECH</text>

  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!--
    astra favicon · the italic 'a' on a deep abyss disc
    single-color, scales cleanly down to 16x16
  -->
  <defs>
    <radialGradient id="abyss" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#131d30"/>
      <stop offset="70%" stop-color="#060a15"/>
      <stop offset="100%" stop-color="#02040a"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Deep abyss disc -->
  <circle cx="32" cy="32" r="32" fill="url(#abyss)"/>

  <!-- Subtle inner rim -->
  <circle cx="32" cy="32" r="31" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>

  <!-- The italic 'a' — rendered as a single path that evokes the serif italic
       of PP Editorial New / Instrument Serif. Glows softly. -->
  <g filter="url(#glow)">
    <text x="32" y="46"
          text-anchor="middle"
          font-family="'Instrument Serif', 'PP Editorial New', 'Canela', Georgia, serif"
          font-style="italic"
          font-size="42"
          font-weight="400"
          fill="rgba(255,255,255,0.94)"
          letter-spacing="-0.02em">a</text>
  </g>
</svg>
